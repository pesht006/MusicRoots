name: Deploy MusicRoots to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Permissions required by the official GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build static site
        working-directory: web
        env:
          VITE_STATIC: "true"
          VITE_BASE: "/MusicRoots/"
          # Set these in repo Settings → Secrets and variables → Actions → Variables
          # after deploying the Cloudflare Worker (see worker/README.md).
          VITE_SUBMIT_URL: ${{ vars.SUBMIT_URL }}
          VITE_TURNSTILE_SITEKEY: ${{ vars.TURNSTILE_SITEKEY }}
        run: npm run build:static

      # Configure Pages for the "GitHub Actions" build type (enables it / switches
      # the source automatically when the token has pages:write).
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
